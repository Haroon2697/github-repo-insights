<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Intelligence Dashboard — settings</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 520px;
        margin: 24px;
      }
      label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        padding: 8px;
        box-sizing: border-box;
      }
      button {
        margin-top: 12px;
        padding: 8px 16px;
        cursor: pointer;
      }
      .saved {
        color: #1a7f37;
        margin-top: 8px;
        font-size: 14px;
      }
      p.note {
        font-size: 13px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <h1>Dashboard base URL</h1>
    <p class="note">
      Where the React app is hosted (no trailing slash). Examples: <code>http://localhost:5173</code> while
      developing, or your Vercel URL after deploy. Everyone who installs the extension points to
      <strong>their</strong> chosen deployment (or yours if you give them this URL).
    </p>
    <label for="base">Dashboard URL</label>
    <input id="base" type="url" placeholder="https://your-app.vercel.app" autocomplete="off" />
    <button id="save" type="button">Save</button>
    <p id="msg" class="saved" hidden>Saved.</p>
    <script src="options.js"></script>
  </body>
</html>
